{% extends 'base.html' %}

{% block title %}Edit Job Posting{% endblock %}

{% block content %}
<div class="container">
    <div class="card" style="max-width: 600px; margin: 0 auto;">
        <div class="card-header">
            <h2 class="card-title">Edit Job Posting</h2>
            <p class="card-subtitle">Update the details for {{ job.job_title }}.</p>
        </div>
        
        <form action="/edit-job/{{ job.id }}" method="POST">
            <div class="form-group">
                <label for="jobTitle">Job Title</label>
                <input type="text" id="jobTitle" name="jobTitle" required value="{{ job.job_title }}">
            </div>

            <div class="form-group">
                <label for="stipend">Stipend / Salary</label>
                <input type="text" id="stipend" name="stipend" required value="{{ job.stipend }}">
            </div>
            
            <div class="form-group">
                <label for="jobDescription">Job Description</label>
                <textarea id="jobDescription" name="jobDescription" required rows="4">{{ job.job_description }}</textarea>
            </div>

            <div class="form-group checkbox-group mt-3 mb-4">
                <input type="checkbox" id="checkbox" name="checkbox" value="Vacant" {% if job.job_status == 'Vacant' or job.job_status == 'vacant' %}checked{% endif %}>
                <label for="checkbox" style="margin-bottom: 0;">Mark as Vacant (Leave unchecked if filled)</label>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block mb-3">Save Changes</button>
        </form>
        
        <div class="text-center">
            <a href="/employeer-dashboard">Back to Dashboard</a>
        </div>
    </div>
</div>
{% endblock %}
