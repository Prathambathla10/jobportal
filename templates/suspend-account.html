{% extends 'base.html' %}

{% block title %}Suspend Account{% endblock %}

{% block content %}
<div class="container">
    <div class="card" style="max-width: 500px; margin: 0 auto; border-top: 4px solid #f59e0b;">
        <div class="card-header">
            <h2 class="card-title">Suspend User Account</h2>
            <p class="card-subtitle">Admin action to suspend a user.</p>
        </div>
        
        <form action="/suspend-account" method="POST">
            <div class="form-group">
                <label for="username">Username to Suspend</label>
                <input type="text" name="username" id="username" required placeholder="Enter username">
            </div>

            <button type="submit" class="btn btn-primary btn-block mb-3" style="background-color: #f59e0b; color: white;">Suspend Account</button>
        </form>
        
        <div class="text-center">
            <a href="/employeer-dashboard">Back to Dashboard</a>
        </div>
    </div>
</div>
{% endblock %}
