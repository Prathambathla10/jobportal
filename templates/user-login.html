{% extends 'base.html' %}

{% block title %}User Login{% endblock %}

{% block content %}
<div class="container">
    <div class="card" style="max-width: 500px; margin: 0 auto;">
        <div class="card-header">
            <h2 class="card-title">User Login</h2>
            <p class="card-subtitle">Welcome back! Please login to your account.</p>
        </div>
        
        <form action="/user-login" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Enter your username">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>
            
            <button type="submit" class="btn btn-primary btn-block mb-3">Log In</button>
        </form>
        
        <div class="text-center mt-3">
            <p>Don't have an account? <a href="/user-signup">Sign up here</a></p>
        </div>
    </div>
</div>
{% endblock %}
