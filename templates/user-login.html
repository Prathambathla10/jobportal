{% extends 'base.html' %}
{% block title %}User Login{% endblock %}
{% block content %}
<div class="container" style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
    <div class="card" style="width: 100%; max-width: 450px; animation: slideInLeft 0.6s ease-out forwards;">
        <div class="card-header">
            <h2 class="card-title">Welcome Back</h2>
            <p class="card-subtitle">Log in to your job seeker account</p>
        </div>
        <form action="/user-login" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn btn-primary btn-block mt-2 mb-4">Sign In</button>
        </form>
        <div class="text-center">
            <p style="color: var(--text-muted); font-size: 0.95rem;">New here? <a href="/user-signup" style="font-weight: 600;">Create an account</a></p>
        </div>
    </div>
</div>
{% endblock %}
