<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Job Portal{% endblock %}</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">ProJob Portal</a>
        <div class="navbar-nav">
            <a href="/" class="nav-link">Home</a>
            <a href="/user-login" class="nav-link">Job Seekers</a>
            <a href="/employeer-login" class="nav-link">Employers</a>
        </div>
    </nav>

    <main class="fade-in">
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 ProJob Portal. Designed for professionals.</p>
    </footer>

    <!-- Main Script -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
