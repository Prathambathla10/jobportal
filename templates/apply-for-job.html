{% extends 'base.html' %}

{% block title %}Apply for Job{% endblock %}

{% block content %}
<div class="container">
    <div class="card" style="max-width: 600px; margin: 0 auto;">
        <div class="card-header">
            <h2 class="card-title">Job Application Form</h2>
            <p class="card-subtitle">Submit your details to apply for this position.</p>
        </div>

        <form action="/apply-for-job" method="post" onsubmit="alert('This feature is disabled currently'); return false;">
            <div class="form-group">
                <label for="username">Portal Username</label>
                <input type="text" id="username" name="username" required placeholder="Your ProJob username">
            </div>

            <div class="form-group">
                <label for="email">Contact Email</label>
                <input type="email" id="email" name="email" required placeholder="you@example.com">
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="text" id="phone" name="phone" required placeholder="e.g. +1 234 567 8900">
            </div>

            <div class="form-group">
                <label for="description">Why are you a good fit?</label>
                <textarea id="description" name="description" required rows="3"
                    placeholder="Briefly describe your qualifications..."></textarea>
            </div>

            <div class="form-group">
                <label for="resume">Resume Link</label>
                <input type="url" id="resume" name="resume" required placeholder="https://link-to-your-resume.com">
                <small class="text-muted" style="display:block; margin-top:0.25rem;">Please provide a link to your
                    hosted resume (Google Drive, Dropbox, etc.)</small>
            </div>

            <button type="submit" class="btn btn-primary btn-block mt-4 mb-3">Submit Application</button>
        </form>

        <div class="text-center">
            <a href="/user-job-search">Back to Job Search</a>
        </div>
    </div>
</div>
{% endblock %}
