{% extends 'base.html' %}

{% block title %}Employer Sign Up{% endblock %}

{% block content %}
<div class="container">
    <div class="card" style="max-width: 500px; margin: 0 auto;">
        <div class="card-header">
            <h2 class="card-title">Create Employer Account</h2>
            <p class="card-subtitle">Start posting jobs and finding great candidates.</p>
        </div>
        
        <form action="/employeer-signup" method="post">
            <div class="form-group">
                <label for="username">Choose a Username</label>
                <input type="text" id="username" name="username" required placeholder="e.g. tech_corp_hr">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Create a strong password">
            </div>
            
            <button type="submit" class="btn btn-primary btn-block mb-3">Sign Up as Employer</button>
        </form>
        
        <div class="text-center mt-3">
            <p>Already have an account? <a href="/employeer-login">Log in here</a></p>
        </div>
    </div>
</div>
{% endblock %}
