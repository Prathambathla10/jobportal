{% extends 'base.html' %}

{% block title %}Employer Login{% endblock %}

{% block content %}
<div class="container">
    <div class="card" style="max-width: 500px; margin: 0 auto;">
        <div class="card-header">
            <h2 class="card-title">Employer Login</h2>
            <p class="card-subtitle">Access your employer dashboard to manage jobs.</p>
        </div>
        
        <form action="/employeer-login" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Enter your username">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>
            
            <button type="submit" class="btn btn-primary btn-block mb-3">Log In as Employer</button>
        </form>
        
        <div class="text-center mt-3">
            <p>Don't have an employer account? <a href="/employeer-signup">Sign up here</a></p>
        </div>
    </div>
</div>
{% endblock %}
