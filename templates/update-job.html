{% extends 'base.html' %}

{% block title %}Update Job Posting{% endblock %}

{% block content %}
<div class="container">
    <div class="card" style="max-width: 600px; margin: 0 auto;">
        <div class="card-header">
            <h2 class="card-title">Update Job Posting</h2>
            <p class="card-subtitle" style="color: #dc2626;">Note: Job will be updated based on the exact Job Title.</p>
        </div>
        
        <form action="/update-job" method="POST">
            <div class="form-group">
                <label for="jobTitle">Job Title (Must match existing)</label>
                <input type="text" id="jobTitle" name="jobTitle" required placeholder="Enter exact job title">
            </div>
            
            <div class="form-group">
                <label for="employerName">HR Name / Company</label>
                <input type="text" id="employerName" name="employerName" required>
            </div>
            
            <div class="form-group">
                <label for="jobDescription">New Job Description</label>
                <textarea id="jobDescription" name="jobDescription" required rows="4"></textarea>
            </div>

            <div class="form-group checkbox-group mt-3 mb-4">
                <input type="checkbox" id="checkbox" name="checkbox" value="Vacant">
                <label for="checkbox" style="margin-bottom: 0;">Mark as Vacant (Leave unchecked if filled)</label>
            </div>
            
            <button type="submit" class="btn btn-secondary btn-block mb-3">Update Job</button>
        </form>
        
        <div class="text-center">
            <a href="/employeer-dashboard">Back to Dashboard</a>
        </div>
    </div>
</div>
{% endblock %}
