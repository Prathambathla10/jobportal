{% extends 'base.html' %}
{% block title %}User Registration{% endblock %}
{% block content %}
<div class="container" style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
    <div class="card" style="width: 100%; max-width: 450px; animation: slideInRight 0.6s ease-out forwards;">
        <div class="card-header">
            <h2 class="card-title">Join Us</h2>
            <p class="card-subtitle">Create your job seeker account</p>
        </div>
        <form action="/user-signup" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Choose a username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Create a password">
            </div>
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required placeholder="Enter your full name">
            </div>
            <button type="submit" class="btn btn-primary btn-block mt-2 mb-4">Create Account</button>
        </form>
        <div class="text-center">
            <p style="color: var(--text-muted); font-size: 0.95rem;">Already have an account? <a href="/user-login" style="font-weight: 600;">Sign in</a></p>
        </div>
    </div>
</div>
{% endblock %}
