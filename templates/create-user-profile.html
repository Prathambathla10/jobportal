{% extends 'base.html' %}

{% block title %}Create Profile{% endblock %}

{% block content %}
<div class="container">
    <div class="card" style="max-width: 600px; margin: 0 auto;">
        <div class="card-header">
            <h2 class="card-title">Create Profile</h2>
            <p class="card-subtitle">Complete your profile for {{ username }}</p>
        </div>
        
        <form action="/create-user-profile/{{username}}" method="post" enctype="multipart/form-data">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required placeholder="Enter your full name">
            </div>
            
            <div class="form-group">
                <label for="image">Profile Picture</label>
                <input type="file" id="image" name="image" accept="image/*" class="mt-1" style="width: 100%; padding: 0.5rem; border: 1px dashed var(--border-color); border-radius: var(--radius);">
            </div>
            
            <button type="submit" class="btn btn-primary btn-block mb-2">Save Profile</button>
        </form>
    </div>
</div>
{% endblock %}
