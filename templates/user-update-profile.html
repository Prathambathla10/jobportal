{% extends 'base.html' %}

{% block title %}Update Profile{% endblock %}

{% block content %}
<div class="container">
    <div class="card" style="max-width: 500px; margin: 0 auto;">
        <div class="card-header">
            <h2 class="card-title">Update Password</h2>
            <p class="card-subtitle">Change your account password securely.</p>
        </div>
        
        <form action="/user-update-profile" method="post">
            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter new password">
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required placeholder="Confirm your new password">
            </div>
            
            <button type="submit" class="btn btn-primary btn-block mb-2">Update Password</button>
        </form>
        
        <div class="text-center mt-3">
            <a href="/user-dashboard">Back to Dashboard</a>
        </div>
    </div>
</div>
{% endblock %}
