{% extends 'base.html' %}

{% block title %}Employer Profile Setup{% endblock %}

{% block content %}
<div class="container text-center">
    <div class="card" style="max-width: 600px; margin: 0 auto;">
        <h2 class="card-title mb-3">Welcome, {{ username }}!</h2>
        <p class="mb-4">Your employer account has been created. Next, let's set up your company profile.</p>
        
        <a href="/create-employeer-profile/{{username}}" class="btn btn-primary mb-2">Complete Profile Now</a>
        <br>
        <a href="/employeer-dashboard" class="btn btn-secondary mt-2">Skip for now</a>
    </div>
</div>
{% endblock %}
